services:
  addon:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      UPSTREAM_BASE_URL: "${UPSTREAM_BASE_URL:-http://example-upstream.invalid}"
      TOP_K_PHASE1: "${TOP_K_PHASE1:-10}"
      TOP_M_PHASE2: "${TOP_M_PHASE2:-5}"
      TOP_P_WEIRD: "${TOP_P_WEIRD:-3}"
      T_PROBE_TOTAL_MS: "${T_PROBE_TOTAL_MS:-1800}"
      T_TTFB_MS: "${T_TTFB_MS:-250}"
      UPSTREAM_TIMEOUT_MS: "${UPSTREAM_TIMEOUT_MS:-10000}"
      MAX_CONCURRENCY: "${MAX_CONCURRENCY:-12}"
      PREFERRED_AUDIO_LANGS: "${PREFERRED_AUDIO_LANGS:-nl,en}"
      PREFERRED_SUB_LANGS: "${PREFERRED_SUB_LANGS:-}"
      REQUIRE_SEEKABLE: "${REQUIRE_SEEKABLE:-true}"
      PREFER_HDR: "${PREFER_HDR:-true}"
      PREFER_CODEC: "${PREFER_CODEC:-hevc,avc,av1}"
      MIN_VIDEO_HEIGHT: "${MIN_VIDEO_HEIGHT:-720}"
      MAX_REDIRECTS: "${MAX_REDIRECTS:-2}"
      USER_AGENT: "${USER_AGENT:-StremioLinkRanker/1.0}"
      UPGRADE_HTTP_STREAM_URLS: "${UPGRADE_HTTP_STREAM_URLS:-true}"
      MKV_META_MAX_BYTES: "${MKV_META_MAX_BYTES:-2097152}"
      MKV_META_CHUNK_BYTES: "${MKV_META_CHUNK_BYTES:-262144}"
      WEIRD_PROBE_BYTES: "${WEIRD_PROBE_BYTES:-512}"
      STREAM_CACHE_TTL_S: "${STREAM_CACHE_TTL_S:-90}"
      PROBE_CACHE_TTL_S: "${PROBE_CACHE_TTL_S:-600}"
      META_CACHE_TTL_S: "${META_CACHE_TTL_S:-1800}"
      STREAM_CACHE_MAX_ENTRIES: "${STREAM_CACHE_MAX_ENTRIES:-256}"
      PROBE_CACHE_MAX_ENTRIES: "${PROBE_CACHE_MAX_ENTRIES:-2048}"
      META_CACHE_MAX_ENTRIES: "${META_CACHE_MAX_ENTRIES:-2048}"
